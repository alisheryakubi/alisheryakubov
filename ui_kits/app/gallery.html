<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
  .page-header { max-width: 900px; margin: 0 auto 40px; padding: 0 clamp(20px, 4vw, 48px); }
  .page-header h1 { font-size: clamp(28px, 3vw, 40px); margin-bottom: 12px; }
  .page-header p { color: var(--muted); max-width: 55ch; }
  .back-link { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; margin-bottom: 24px; font-size: 14px; font-weight: 550; }
  .back-link:hover { text-decoration: none; }
  .demo-section { max-width: 900px; margin: 0 auto; padding: 0 clamp(20px, 4vw, 48px) 80px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (min-width: 640px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 768px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
  .gallery-item { overflow: hidden; border-radius: var(--radius-sm); border: 1px solid var(--border); aspect-ratio: 1/1; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
  .gallery-item:hover img { transform: scale(1.05); }
</style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<header class="page-header">
  <a href="index.html" class="back-link eyebrow">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    UI Kit
  </a>
  <span class="eyebrow">Component</span>
  <h1>Gallery</h1>
  <p>Square image grid with hover scale. Responsive: 2 columns on mobile, 3 on tablet, 4 on desktop.</p>
</header>

<main class="demo-section">
  <div class="gallery-grid" data-od-id="gallery">
    <div class="gallery-item"><img src="../../assets/gallery/event-01.jpg" alt="Event"></div>
    <div class="gallery-item"><img src="../../assets/gallery/conference-01.jpg" alt="Conference"></div>
    <div class="gallery-item"><img src="../../assets/gallery/networking-01.jpg" alt="Networking"></div>
    <div class="gallery-item"><img src="../../assets/gallery/speaking-01.jpg" alt="Speaking"></div>
    <div class="gallery-item"><img src="../../assets/gallery/awards-01.jpg" alt="Awards"></div>
    <div class="gallery-item"><img src="../../assets/gallery/behind-scenes-01.jpg" alt="Behind the scenes"></div>
    <div class="gallery-item"><img src="../../assets/gallery/event-02.jpg" alt="Event 2"></div>
    <div class="gallery-item"><img src="../../assets/gallery/conference-02.jpg" alt="Conference 2"></div>
  </div>
</main>

</body>
</html>
